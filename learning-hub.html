<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AlgoCamp · AI Learning Hub</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css" id="theme" />

  <style>
    :root{
      --accent:#6ee7ff;
      --accent2:#a78bfa;
      --analogy:#fbbf24;
      --aha:#34d399;
      --ink:#e8edf2;
      --muted:#9aa6b2;
      --panel:rgba(255,255,255,.04);
      --panel-border:rgba(255,255,255,.10);
    }

    .reveal{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
      color:var(--ink);
      font-size:30px;
    }
    .reveal .slides{ text-align:left; }
    .reveal h1,.reveal h2,.reveal h3,.reveal h4{
      text-transform:none; letter-spacing:-.01em; line-height:1.12; font-weight:700;
    }
    .reveal h1{ font-size:2.0em; }
    .reveal h2{ font-size:1.45em; }
    .reveal h3{ font-size:1.1em; }
    .reveal p,.reveal li{ line-height:1.45; }
    .reveal a{ color:var(--accent); text-decoration:none; border-bottom:1px dotted rgba(110,231,255,.4); }
    .reveal section{ top:6% !important; }

    /* gradient text accent */
    .grad{
      background:linear-gradient(95deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; background-clip:text; color:transparent;
    }

    /* ---- Title slide ---- */
    .hero{ text-align:center; }
    .hero .kicker{ color:var(--muted); letter-spacing:.32em; font-size:.5em; text-transform:uppercase; margin-bottom:.6em; }
    .hero h1{ font-size:2.6em; margin:.1em 0; }
    .hero .sub{ color:var(--muted); font-size:.78em; max-width:18em; margin:.6em auto 0; }
    .hero .hint{ margin-top:1.6em; font-size:.5em; color:var(--muted); }
    .hero .hint kbd{
      background:var(--panel); border:1px solid var(--panel-border); border-radius:6px;
      padding:.12em .5em; margin:0 .15em; color:var(--ink); font-family:inherit;
    }

    /* ---- Project divider slide ---- */
    .divider .num{
      font-size:1.0em; color:var(--muted); letter-spacing:.3em; text-transform:uppercase;
    }
    .divider h2{ font-size:2.0em; margin:.1em 0 .35em; }
    .divider .tag{ color:var(--accent); font-size:.66em; font-weight:600; }
    .divider .concepts{ color:var(--muted); font-size:.62em; margin-top:1.1em; max-width:24em; }
    .divider .down{ margin-top:1.4em; font-size:.5em; color:var(--muted); }

    /* ---- Concept slide ---- */
    .concept .eyebrow{
      color:var(--accent2); font-size:.55em; font-weight:700; letter-spacing:.16em;
      text-transform:uppercase; margin-bottom:.3em;
    }
    .concept h3{ font-size:1.35em; margin:0 0 .5em; color:#fff; }
    .concept .explain{ font-size:.82em; color:#dbe3ea; max-width:30em; }

    .box{
      border-radius:14px; padding:.7em .95em; margin-top:.7em; max-width:32em;
      background:var(--panel); border:1px solid var(--panel-border);
      font-size:.74em; line-height:1.4;
    }
    .box .label{
      display:inline-block; font-weight:800; font-size:.82em; letter-spacing:.08em;
      text-transform:uppercase; margin-right:.5em;
    }
    .box.analogy{ border-left:4px solid var(--analogy); }
    .box.analogy .label{ color:var(--analogy); }
    .box.aha{ border-left:4px solid var(--aha); }
    .box.aha .label{ color:var(--aha); }

    .reveal .src{ font-size:.5em; color:var(--muted); margin-top:.7em; }

    /* progress / footer */
    .reveal .slide-number{ font-size:14px; }

    /* roadmap grid on overview */
    .grid{
      display:grid; grid-template-columns:repeat(3,1fr); gap:.55em; font-size:.5em; margin-top:.4em;
    }
    .grid .card{
      background:var(--panel); border:1px solid var(--panel-border); border-radius:10px;
      padding:.65em .7em;
    }
    .grid .card b{ color:var(--accent); display:block; font-size:1.05em; }
    .grid .card span{ color:var(--muted); }

    .warn{
      border-left:4px solid #f87171; background:rgba(248,113,113,.08);
      border-radius:12px; padding:.7em 1em; margin-top:.8em; font-size:.7em; max-width:30em;
    }
    .warn b{ color:#f87171; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides" id="slides">
      <!-- generated by JS -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>

  <script src="hub-content.js"></script>
  <script>
    /* ---------- render ---------- */
    const esc = s => (s==null?'':String(s));
    const slidesEl = document.getElementById('slides');

    function conceptSlide(c){
      return `
        <section class="concept" data-auto-animate>
          <div class="eyebrow">${esc(c.eyebrow||'Concept')}</div>
          <h3>${esc(c.title)}</h3>
          <p class="explain">${esc(c.explain)}</p>
          <div class="box analogy"><span class="label">Analogy</span>${esc(c.analogy)}</div>
          <div class="box aha"><span class="label">Aha</span>${esc(c.aha)}</div>
          ${c.src?`<div class="src">Source: ${esc(c.src)}</div>`:''}
        </section>`;
    }

    function projectSection(p, idx){
      const total = p.concepts.length;
      const intro = `
        <section class="divider" data-background-gradient="linear-gradient(135deg,#0b1220,#15233b 60%,#1b1530)">
          <div class="num">Project ${String(p.n).padStart(2,'0')}</div>
          <h2>${esc(p.title)}</h2>
          <div class="tag">${esc(p.tag)}</div>
          <div class="concepts"><b style="color:var(--ink)">You'll learn:</b> ${p.concepts.map(c=>esc(c.title)).join(' · ')}</div>
          ${p.warn?`<div class="warn"><b>⚠ Heads up:</b> ${esc(p.warn)}</div>`:''}
          <div class="down">↓ ${total} concept${total>1?'s':''} below — press <b>Space</b> to walk through</div>
        </section>`;
      return `<section>${intro}${p.concepts.map(conceptSlide).join('')}</section>`;
    }

    /* title + overview */
    const titleSlide = `
      <section class="hero" data-background-gradient="radial-gradient(circle at 30% 20%, #1b2a4a, #0a0e17 70%)">
        <div class="kicker">AlgoCamp · 12 Hands-On Builds</div>
        <h1 class="grad">AI Learning Hub</h1>
        <p class="sub">A concept-first tour of 12 AI/ML projects — the ideas behind the code, explained with analogies that stick.</p>
        <div class="hint">
          <kbd>→</kbd> next project &nbsp; <kbd>↓</kbd> dive into concepts &nbsp; <kbd>Esc</kbd> overview map
        </div>
      </section>`;

    const overviewSlide = `
      <section data-background-gradient="linear-gradient(135deg,#0a0e17,#101a2e)">
        <h2 style="font-size:1.5em">The Map <span style="color:var(--muted);font-size:.5em;font-weight:400">— 4 themes, 12 builds</span></h2>
        <p style="color:var(--muted);font-size:.6em;margin:.2em 0 .1em">Move <b style="color:var(--accent)">→</b> across projects, <b style="color:var(--accent)">↓</b> through the concepts inside each.</p>
        <div class="grid">
          ${HUB.map(p=>`<div class="card"><b>${String(p.n).padStart(2,'0')} · ${esc(p.title)}</b><span>${esc(p.tag)}</span></div>`).join('')}
        </div>
      </section>`;

    slidesEl.innerHTML =
      titleSlide +
      overviewSlide +
      HUB.map(projectSection).join('') +
      `<section class="hero" data-background-gradient="radial-gradient(circle at 70% 30%, #1b2a4a, #0a0e17 70%)">
        <h1 class="grad" style="font-size:1.8em">That's the tour ✦</h1>
        <p class="sub">From a single API call to autoencoders — you've seen the big ideas behind every build. Now go open the code and watch them come alive.</p>
        <div class="hint">Press <kbd>Esc</kbd> for the map · <kbd>←</kbd> to revisit any concept</div>
      </section>`;

    Reveal.initialize({
      hash:true,
      slideNumber:'c/t',
      transition:'slide',
      backgroundTransition:'fade',
      controls:true,
      progress:true,
      center:false,
      width:1280, height:760, margin:0.06
    });
  </script>
</body>
</html>
